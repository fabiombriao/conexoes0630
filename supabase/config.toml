# Supabase CLI Configuration
# Este arquivo pode ser commitado pois não contém dados sensíveis

[functions.monthly-ranking-manager]
verify_jwt = false

[functions.send-approval-email]
enabled = true
verify_jwt = true
import_map = "./functions/send-approval-email/deno.json"
# Uncomment to specify a custom file path to the entrypoint.
# Supported file extensions are: .ts, .js, .mjs, .jsx, .tsx
entrypoint = "./functions/send-approval-email/index.ts"
# Specifies static files to be bundled with the function. Supports glob patterns.
# For example, if you want to serve static HTML pages in your function:
# static_files = [ "./functions/send-approval-email/*.html" ]

[functions.term-commitment-sign]
enabled = true
verify_jwt = true
entrypoint = "./functions/term-commitment-sign/index.ts"
